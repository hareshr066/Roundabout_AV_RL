name: roundabout_rl
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24.0
  - pandas>=2.0.0
  - matplotlib>=3.7.0
  - pytorch>=2.1.0
  - cpuonly # Default to CPU. Remove or change to cudatoolkit/pytorch-cuda if GPU is needed.
  - pip
  - pip:
      - gymnasium==0.29.1
      - stable-baselines3==2.3.2
      - traci==1.20.0
      - sumolib==1.20.0
      - tensorboard>=2.15.0
      - pytest>=7.4.0
      - ipykernel>=6.25.0
